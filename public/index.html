<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Time & PTO</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<div id="login-screen" class="screen">
  <div class="login-card">
    <h1>Time &amp; PTO</h1>
    <form id="login-form">
      <label>Email
        <input type="email" id="login-email" required autocomplete="username" />
      </label>
      <label>Password
        <input type="password" id="login-password" required autocomplete="current-password" />
      </label>
      <button type="submit">Log in</button>
      <p class="error" id="login-error"></p>
    </form>
  </div>
</div>

<div id="app-screen" class="screen" style="display:none;">
  <header class="topbar">
    <div class="brand">Time &amp; PTO</div>
    <nav id="main-nav"></nav>
    <div class="who">
      <span id="who-name"></span>
      <button id="logout-btn" class="link-btn">Log out</button>
    </div>
  </header>

  <main id="view-root" class="view-root"></main>
</div>

<template id="tpl-toast"><div class="toast"></div></template>

<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
